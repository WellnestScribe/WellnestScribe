[database]
# URI is set via TRYTOND_DATABASE__URI env var in docker-compose.yml
# Fallback shown here for reference:
; uri = postgresql://gnuhealth:gnuhealth_secret@gnuhealth-db:5432/
path = /var/lib/trytond

[web]
# Listen address set via TRYTOND_WEB__LISTEN env var
; listen = 0.0.0.0:8069
root = /opt/gnuhealth/web

[session]
# Extend idle timeout (seconds) — default is 300
max_age = 3600
