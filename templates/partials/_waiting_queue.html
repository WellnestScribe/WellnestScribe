{# Reusable waiting-patients queue: polls /emr/api/queue/, reorder + remove-with-reason, hides when empty. #}
<div class="row d-none" id="waitingQueueWrap">
    <div class="col-12">
        <div class="card mb-3 border-primary-subtle">
            <div class="card-body p-3">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <h6 class="fw-semibold mb-0 d-flex align-items-center gap-2">
                        <iconify-icon icon="iconamoon:profile-circle-duotone" class="text-primary fs-5"></iconify-icon>
                        Waiting patients <span class="badge bg-primary-subtle text-primary" id="waitingQueueCount">0</span>
                    </h6>
                    <span class="small text-muted" id="waitingQueueUpdated"></span>
                </div>
                <div id="waitingQueueList" class="d-flex flex-column gap-2 wn-scroll" style="max-height:232px;overflow-y:auto;"></div>
            </div>
        </div>
    </div>
</div>
<script>
(function () {
    var wrap = document.getElementById('waitingQueueWrap');
    var list = document.getElementById('waitingQueueList');
    var countEl = document.getElementById('waitingQueueCount');
    var updEl = document.getElementById('waitingQueueUpdated');
    if (!wrap || !list) return;
    function csrf() { return (window.WELLNEST && window.WELLNEST.getCsrf) ? window.WELLNEST.getCsrf() : ''; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function mins(iso) { try { var d = new Date(iso); return Math.max(0, Math.round((Date.now() - d.getTime()) / 60000)) + 'm'; } catch (e) { return ''; } }
    function badge(s) { return {checked_in:'secondary', triage:'info', with_doctor:'success'}[s] || 'secondary'; }

    function post(url, body) {
        return fetch(url, {
            method: 'POST', credentials: 'same-origin',
            headers: {'X-CSRFToken': csrf(), 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest'},
            body: new URLSearchParams(body || {}).toString()
        }).then(function () { poll(); });
    }
    function remove(apptId, name) {
        var doIt = function (reason) { post('/emr/appointments/' + apptId + '/status/', {status: 'cancelled', reason: reason}); };
        if (window.Swal) {
            window.Swal.fire({
                title: 'Remove ' + name + ' from the queue?',
                input: 'select',
                inputOptions: {'Patient left': 'Patient left', 'Sent home': 'Sent home', 'Seen elsewhere': 'Seen elsewhere', 'Rescheduled': 'Rescheduled'},
                inputPlaceholder: 'Reason (required)',
                showCancelButton: true, confirmButtonText: 'Remove from queue',
                inputValidator: function (v) { return v ? undefined : 'A reason is required.'; }
            }).then(function (res) { if (res.isConfirmed && res.value) doIt(res.value); });
        } else {
            var r = prompt('Reason for removing ' + name + ' (required):');
            if (r) doIt(r);
        }
    }

    // One delegated handler for all reorder/remove buttons (survives re-render).
    list.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-q-action]');
        if (!btn) return;
        e.preventDefault();
        var action = btn.getAttribute('data-q-action');
        var appt = btn.getAttribute('data-appt');
        if (action === 'up' || action === 'down') post('/emr/appointments/' + appt + '/reorder/', {direction: action});
        else if (action === 'remove') remove(appt, btn.getAttribute('data-name') || 'patient');
    });

    function render(data) {
        var q = (data && data.queue) || [];
        if (!q.length) { wrap.classList.add('d-none'); return; }
        wrap.classList.remove('d-none');
        if (countEl) countEl.textContent = q.length;
        var html = '';
        q.forEach(function (p) {
            var v = p.vitals || {}, vb = [];
            if (v.bp) vb.push('BP ' + esc(v.bp));
            if (v.weight) vb.push(esc(v.weight));
            if (v.glucose) vb.push('Glu ' + esc(v.glucose));
            if (v.temp) vb.push(esc(v.temp));
            var vitals = vb.length ? vb.join(' · ') : '<span class="text-warning-emphasis">vitals pending</span>';
            var bc = badge(p.status);
            html += '<div class="session-row">' +
                '<a href="' + esc(p.record_url) + '" class="d-flex align-items-center gap-2 flex-grow-1 text-decoration-none text-body">' +
                    '<span class="badge rounded-pill bg-primary text-white flex-shrink-0" style="min-width:1.5rem;">' + p.position + '</span>' +
                    '<span class="session-icon"><iconify-icon icon="iconamoon:profile-duotone"></iconify-icon></span>' +
                    '<span class="flex-grow-1">' +
                        '<span class="d-block fw-semibold">' + esc(p.name) + ' <span class="text-muted fw-normal" style="font-size:.75rem;">' + esc(p.mrn) + ' · ' + esc(p.age) + 'y · ' + esc(p.sex) + '</span></span>' +
                        '<span class="d-block small text-muted">' + vitals + (p.complaint ? (' · ' + esc(p.complaint)) : '') + '</span>' +
                    '</span>' +
                '</a>' +
                '<span class="d-flex align-items-center gap-1 flex-shrink-0">' +
                    '<span class="badge rounded-pill bg-' + bc + '-subtle text-' + bc + '">' + esc(p.status_label) + ' · ' + mins(p.scheduled_for) + '</span>' +
                    '<button type="button" class="btn btn-sm btn-link p-1 text-muted" title="Move up" data-q-action="up" data-appt="' + p.appointment_id + '"><iconify-icon icon="iconamoon:arrow-up-2-bold"></iconify-icon></button>' +
                    '<button type="button" class="btn btn-sm btn-link p-1 text-muted" title="Move down" data-q-action="down" data-appt="' + p.appointment_id + '"><iconify-icon icon="iconamoon:arrow-down-2-bold"></iconify-icon></button>' +
                    '<button type="button" class="btn btn-sm btn-link p-1 text-danger" title="Remove from queue" data-q-action="remove" data-appt="' + p.appointment_id + '" data-name="' + esc(p.name) + '"><iconify-icon icon="iconamoon:close-bold"></iconify-icon></button>' +
                '</span>' +
            '</div>';
        });
        list.innerHTML = html;
        if (updEl) updEl.textContent = 'updated just now';
    }
    function poll() {
        if (document.hidden) return;
        fetch('/emr/api/queue/', { credentials: 'same-origin' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) { if (d) render(d); })
            .catch(function () {});
    }
    poll();
    setInterval(poll, 12000);
    document.addEventListener('visibilitychange', function () { if (!document.hidden) poll(); });
})();
</script>
