{% load static %}
<div class="offcanvas offcanvas-bottom mobile-nav-sheet"
     tabindex="-1"
     id="wellnestMobileNav"
     aria-labelledby="wellnestMobileNavLabel">
    <div class="offcanvas-header">
        <div class="d-flex align-items-center gap-2">
            <img src="{% static 'images/wellnest-logo.png' %}" alt="WellNest" height="28">
            <h6 class="offcanvas-title m-0 fw-semibold" id="wellnestMobileNavLabel">WellNest Scribe</h6>
        </div>
        {# No X button — drag handle (CSS ::before) + swipe down to dismiss #}
    </div>
    <div class="offcanvas-body">
        <ul class="navbar-nav">
            {% include "partials/_nav_items.html" %}
        </ul>
    </div>
</div>

<script>
(function () {
  var el = document.getElementById('wellnestMobileNav');
  if (!el) return;
  var startY = 0, dragging = false;

  function getInstance() {
    return (typeof bootstrap !== 'undefined') ? bootstrap.Offcanvas.getInstance(el) : null;
  }

  el.addEventListener('touchstart', function (e) {
    startY = e.touches[0].clientY;
    dragging = true;
    el.style.transition = 'none';
  }, { passive: true });

  el.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 0) el.style.transform = 'translateY(' + dy + 'px)';
  }, { passive: true });

  el.addEventListener('touchend', function (e) {
    if (!dragging) return;
    dragging = false;
    var dy = e.changedTouches[0].clientY - startY;
    el.style.transition = '';
    if (dy > 90) {
      el.style.transform = '';
      var inst = getInstance();
      if (inst) inst.hide();
    } else {
      el.style.transform = '';
    }
  }, { passive: true });

  el.addEventListener('show.bs.offcanvas', function () {
    el.style.transform = '';
    el.style.transition = '';
  });
}());
</script>
