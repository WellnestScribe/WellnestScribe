{% extends "base.html" %}
{% block title %}Access denied - WellNest{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:70vh;">
  <div class="text-center px-3" style="max-width:340px;">
    <div style="font-size:3rem;margin-bottom:1rem;">
      <iconify-icon icon="mdi:lock-alert" style="color:#f59e0b;"></iconify-icon>
    </div>
    <h5 class="fw-bold mb-2">Wrong account</h5>
    <p class="text-muted mb-4">
      This QR code was generated by a different WellNest account.<br>
      Sign in with the correct account to claim this note.
    </p>
    <a href="{% url 'accounts:signout' %}" class="btn btn-outline-secondary btn-sm me-2">Sign out</a>
    <a href="{% url 'scribe:record' %}" class="btn btn-primary btn-sm">Dashboard</a>
  </div>
</div>
{% endblock %}
