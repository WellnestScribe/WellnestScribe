{# Compartmentalized SOAP editor. Each section has a quick-edit mic. #}
<div class="note-section">
    <header>
        <span class="section-label">Subjective</span>
        <button type="button" class="quick-mic-btn"
                data-quick-mic="[data-note-field='subjective']"
                title="Hold to dictate edits">
            <iconify-icon icon="iconamoon:microphone-duotone"></iconify-icon>
        </button>
    </header>
    <textarea class="note-textarea" data-note-field="subjective">{{ note.subjective }}</textarea>
</div>
