{% if note.visit_summary %}
<div class="note-section" data-section-id="visit_summary">
    <div class="ns-sticky-sentinel"></div>
    <header class="note-section-header" id="nsh-visit-summary">
        <span class="note-section-collapse-trigger" data-collapse="visit_summary">
            <iconify-icon icon="iconamoon:arrow-up-2-duotone" class="note-section-toggle-icon"></iconify-icon>
            <span class="section-label">Visit Summary</span>
        </span>
        <div class="note-section-actions">
            <button type="button" class="note-section-btn" data-copy-section="visit_summary" title="Copy summary">
                <iconify-icon icon="iconamoon:copy-duotone"></iconify-icon>
            </button>
        </div>
    </header>
    <div class="note-section-body" id="ns-body-visit_summary">
        <textarea class="note-textarea" data-note-field="visit_summary">{{ note.visit_summary }}</textarea>
    </div>
</div>
{% endif %}

<div class="note-section" data-section-id="subjective">
    <div class="ns-sticky-sentinel"></div>
    <header class="note-section-header" id="nsh-subjective">
        <span class="note-section-collapse-trigger" data-collapse="subjective">
            <iconify-icon icon="iconamoon:arrow-up-2-duotone" class="note-section-toggle-icon"></iconify-icon>
            <span class="section-label">Subjective</span>
        </span>
        <div class="note-section-actions">
            <button type="button" class="note-section-btn" data-thumb="up" data-section="subjective" title="Well captured">
                <iconify-icon icon="iconamoon:like-duotone"></iconify-icon>
            </button>
            <button type="button" class="note-section-btn" data-thumb="down" data-section="subjective" title="Needs improvement">
                <iconify-icon icon="iconamoon:dislike-duotone"></iconify-icon>
            </button>
            <button type="button" class="note-section-btn" data-copy-section="subjective" title="Copy section">
                <iconify-icon icon="iconamoon:copy-duotone"></iconify-icon>
            </button>
            <button type="button" class="quick-mic-btn" data-quick-mic="[data-note-field='subjective']" title="Dictate edits">
                <iconify-icon icon="iconamoon:microphone-duotone"></iconify-icon>
            </button>
        </div>
    </header>
    <div class="note-section-body" id="ns-body-subjective">
        <textarea class="note-textarea" data-note-field="subjective">{{ note.subjective }}</textarea>
    </div>
</div>
